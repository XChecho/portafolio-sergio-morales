<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="white"/>
  
  <!-- Code brackets - subtle, positioned around SM -->
  <text x="6" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="black">&lt;</text>
  <text x="46" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="black">&gt;</text>
  
  <!-- SM initials - bold, centered -->
  <text x="32" y="44" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="black" text-anchor="middle">SM</text>
